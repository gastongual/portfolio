<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Image Framing Tool</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f4f4f5; color: #231f20; padding: 40px; }
    h1 { font-size: 18px; font-weight: 500; margin-bottom: 32px; }
    .card { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 24px; border: 1px solid #e0e0e0; }
    .card-name { font-size: 13px; font-weight: 600; margin-bottom: 14px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
    .card-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
    .preview { border-radius: 12px; overflow: hidden; background: #ddd; }
    .preview img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 50%; display: block; }
    .controls { padding-top: 4px; }
    .slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .slider-row label { font-size: 12px; color: #888; width: 48px; }
    .slider-row input[type=range] { flex: 1; accent-color: #231f20; }
    .slider-row span { font-size: 12px; font-weight: 600; min-width: 44px; text-align: right; }
    #output { background: #1e1e1e; color: #d4d4d4; border-radius: 12px; padding: 24px; margin-top: 32px; font-family: monospace; font-size: 12px; line-height: 1.8; white-space: pre-wrap; }
    .copy-btn { margin-top: 16px; background: #231f20; color: #fff; border: none; border-radius: 10px; padding: 10px 20px; font-size: 13px; cursor: pointer; }
    .copy-btn:hover { background: #444; }
  </style>
</head>
<body>

<h1>Image Framing Tool</h1>
<div id="cards"></div>
<pre id="output"></pre>
<button class="copy-btn" onclick="copyCSS()">Copy CSS</button>

<script>
// Layout: full = 1,4,7,10 | half = 2,3,5,6,8,9
// Half cards have the same HEIGHT as full cards but half the width → ~1:1 aspect ratio
const projects = [
  { id: 1,  name: 'Dressed for Wimbledon', file: 'thumbnails/White-Can.jpg',    type: 'full' },
  { id: 2,  name: 'Artois Probability',    file: 'thumbnails/Probability.jpg',  type: 'half' },
  { id: 3,  name: 'Stuck in Consultancy', file: 'thumbnails/Consultancy.jpg',  type: 'half' },
  { id: 4,  name: 'Get Together',          file: 'thumbnails/Get Together.jpg', type: 'full' },
  { id: 5,  name: 'Pension Delivery',      file: 'thumbnails/Itau.jpg',         type: 'half' },
  { id: 6,  name: 'Miracle Promo',         file: 'thumbnails/Paga-Dios.jpg',    type: 'half' },
  { id: 7,  name: 'Because I want to',     file: 'thumbnails/Foodora.jpg',      type: 'half' },
  { id: 8,  name: 'ResigNATION',           file: 'thumbnails/Resignation.jpg',  type: 'half' },
  { id: 9,  name: 'Lift Up',               file: 'thumbnails/Liftup.jpg',       type: 'half' },
  { id: 10, name: 'Seek Reinvention',      file: 'thumbnails/Globant.jpg',      type: 'full' },
];

const state = {};
projects.forEach(p => { state[p.id] = { x: 50, y: 50, scale: 100 }; });

const container = document.getElementById('cards');

projects.forEach(p => {
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `
    <p class="card-name">${p.id}. ${p.name}</p>
    <div class="card-inner">
      <div class="preview" style="aspect-ratio: ${p.type === 'full' ? '16/8' : '8/8'}">
        <img id="img-${p.id}" src="${p.file}" alt="${p.name}" />
      </div>
      <div class="controls">
        <div class="slider-row">
          <label>X pos</label>
          <input type="range" min="0" max="100" step="1" value="50" id="x-${p.id}" />
          <span id="x-${p.id}-out">50%</span>
        </div>
        <div class="slider-row">
          <label>Y pos</label>
          <input type="range" min="0" max="100" step="1" value="50" id="y-${p.id}" />
          <span id="y-${p.id}-out">50%</span>
        </div>
        <div class="slider-row">
          <label>Scale</label>
          <input type="range" min="100" max="250" step="1" value="100" id="s-${p.id}" />
          <span id="s-${p.id}-out">100%</span>
        </div>
      </div>
    </div>
  `;
  container.appendChild(div);

  function update() {
    const x = document.getElementById(`x-${p.id}`).value;
    const y = document.getElementById(`y-${p.id}`).value;
    const s = document.getElementById(`s-${p.id}`).value;
    document.getElementById(`x-${p.id}-out`).textContent = x + '%';
    document.getElementById(`y-${p.id}-out`).textContent = y + '%';
    document.getElementById(`s-${p.id}-out`).textContent = s + '%';
    const img = document.getElementById(`img-${p.id}`);
    img.style.objectPosition = `${x}% ${y}%`;
    img.style.transform = `scale(${(s/100).toFixed(2)})`;
    img.style.transformOrigin = `${x}% ${y}%`;
    state[p.id] = { x: +x, y: +y, scale: +s };
    updateOutput();
  }

  ['x', 'y', 's'].forEach(k => {
    document.getElementById(`${k}-${p.id}`).addEventListener('input', update);
  });
});

function updateOutput() {
  const lines = projects.map(p => {
    const { x, y, scale } = state[p.id];
    return `/* ${p.id}. ${p.name} */\nobject-position: ${x}% ${y}%;\ntransform: scale(${(scale/100).toFixed(2)});\ntransform-origin: ${x}% ${y}%;`;
  });
  document.getElementById('output').textContent = lines.join('\n\n');
}

function copyCSS() {
  navigator.clipboard.writeText(document.getElementById('output').textContent);
  document.querySelector('.copy-btn').textContent = 'Copied!';
  setTimeout(() => document.querySelector('.copy-btn').textContent = 'Copy CSS', 2000);
}

updateOutput();
</script>
</body>
</html>
